<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sa Bàn Phân Tích Bida Libre</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #1a202c; color: #e2e8f0; }
        #game-container { position: relative; width: 100%; max-width: 1000px; margin: 0 auto; }
        canvas {
            background: #2d3748;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border-radius: 8px;
            cursor: crosshair;
            width: 100%;
            height: auto;
            touch-action: none;
        }
        #spin-pad {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ffffff, #d1d5db);
            position: relative;
            box-shadow: inset 0 -5px 15px rgba(0,0,0,0.2), 0 4px 6px rgba(0,0,0,0.3);
            cursor: pointer;
            border: 2px solid #4a5568;
            touch-action: none;
        }
        .crosshair {
            position: absolute;
            background: rgba(0,0,0,0.15);
        }
        .crosshair-v { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
        .crosshair-h { height: 2px; width: 100%; top: 50%; transform: translateY(-50%); }
        #spin-dot {
            width: 14px;
            height: 14px;
            background: #ef4444;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
            pointer-events: none;
        }
        .mode-btn.active {
            background-color: #3b82f6;
            color: white;
            border-color: #2563eb;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col p-4 font-sans">

    <header class="mb-6 text-center">
        <h1 class="text-3xl font-bold text-white mb-2"><i class="fa-solid fa-route mr-2 text-blue-400"></i> Sa Bàn Phân Tích Bida Libre</h1>
        <p class="text-gray-400 text-sm">Xếp bi, đặt ép-phê và tự do rà chuột để xem quỹ đạo hình học</p>
    </header>

    <div class="flex flex-col lg:flex-row gap-6 max-w-7xl mx-auto w-full">
        <div class="flex-grow flex flex-col items-center">
            <div id="game-container">
                <canvas id="billiard-table" width="1000" height="540"></canvas>
            </div>
            
            <div class="mt-4 flex gap-4 w-full max-w-[1000px] justify-center lg:justify-start">
                <button id="btn-undo" class="px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded text-sm transition-colors">
                    <i class="fa-solid fa-rotate-left mr-1"></i> Đặt lại thế bi
                </button>
                <button id="btn-clear-path" class="px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded text-sm transition-colors">
                    <i class="fa-solid fa-eye-slash mr-1"></i> Tạm ẩn quỹ đạo
                </button>
            </div>
        </div>

        <div class="w-full lg:w-80 bg-gray-800 rounded-xl p-5 shadow-xl flex flex-col gap-6 flex-shrink-0">
            
            <div>
                <h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-3">Chế độ tương tác</h3>
                <div class="flex gap-2">
                    <button id="mode-place" class="mode-btn active flex-1 py-2 px-3 border border-gray-600 rounded bg-gray-700 transition">
                        <i class="fa-solid fa-hand pointer-events-none mb-1 block"></i> Xếp Bi
                    </button>
                    <button id="mode-aim" class="mode-btn flex-1 py-2 px-3 border border-gray-600 rounded bg-gray-700 transition">
                        <i class="fa-solid fa-eye pointer-events-none mb-1 block"></i> Xem Quỹ Đạo
                    </button>
                </div>
                <p id="mode-hint" class="text-xs text-gray-400 mt-2 text-center">Kéo thả các bi để xếp thế bi mong muốn</p>
            </div>

            <div>
                <h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-3">Bi chủ (Cue Ball)</h3>
                <div class="flex gap-4 justify-center">
                    <label class="cursor-pointer flex items-center gap-2">
                        <input type="radio" name="cueball" value="0" checked class="form-radio text-blue-500 bg-gray-700 border-gray-600">
                        <div class="w-6 h-6 rounded-full bg-white shadow-inner border border-gray-300"></div> Trắng
                    </label>
                    <label class="cursor-pointer flex items-center gap-2">
                        <input type="radio" name="cueball" value="1" class="form-radio text-blue-500 bg-gray-700 border-gray-600">
                        <div class="w-6 h-6 rounded-full bg-yellow-400 shadow-inner border border-yellow-600"></div> Vàng
                    </label>
                    <label class="cursor-pointer flex items-center gap-2">
                        <input type="radio" name="cueball" value="2" class="form-radio text-blue-500 bg-gray-700 border-gray-600">
                        <div class="w-6 h-6 rounded-full bg-red-500 shadow-inner border border-red-700"></div> Đỏ
                    </label>
                </div>
            </div>

            <div class="flex flex-col items-center">
                <h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-3 w-full">Điểm chạm (Ép-phê ngang)</h3>
                <div id="spin-pad">
                    <div class="crosshair crosshair-v"></div>
                    <div class="crosshair crosshair-h"></div>
                    <div id="spin-dot"></div>
                </div>
                <div class="flex justify-between w-full mt-2 text-xs text-gray-400 px-4">
                    <span>Trái/Phải: <span id="spin-x-val" class="text-white">0.00</span></span>
                </div>
                <p class="text-xs text-gray-500 text-center mt-2 italic">Chỉ áp dụng ép-phê ngang để tính toán góc nảy băng.</p>
                <button id="btn-reset-spin" class="mt-2 text-xs text-blue-400 hover:text-blue-300">Đặt lại tâm</button>
            </div>

        </div>
    </div>

    <script>
        // --- CẤU HÌNH CƠ BẢN ---
        const canvas = document.getElementById('billiard-table');
        const ctx = canvas.getContext('2d');
        
        const CUSHION_SIZE = 40;
        const TABLE_WIDTH = canvas.width - CUSHION_SIZE * 2; 
        const TABLE_HEIGHT = canvas.height - CUSHION_SIZE * 2; 
        const BALL_RADIUS = 13;
        const WALL_RESTITUTION = 0.85;

        let mode = 'PLACE'; 
        let cueBallIndex = 0; 
        let isDragging = false;
        let dragBallIndex = -1;
        let aimAngle = 0;
        let spinX = 0; 
        let showCue = false; 
        let savedBallsState = [];

        class Ball {
            constructor(x, y, color, id) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.radius = BALL_RADIUS;
                this.id = id;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x + 3, this.y + 3, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0,0,0,0.4)';
                ctx.fill();

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                
                ctx.beginPath();
                ctx.arc(this.x - 4, this.y - 4, this.radius * 0.3, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255,255,255,0.6)';
                ctx.fill();

                if(this.color === '#fcd34d') {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, 2, 0, Math.PI*2);
                    ctx.fillStyle = '#ef4444';
                    ctx.fill();
                }
            }
        }

        const balls = [
            new Ball(300, canvas.height / 2, '#ffffff', 0), 
            new Ball(canvas.width - 300, canvas.height / 2 + 50, '#fcd34d', 1), 
            new Ball(canvas.width - 300, canvas.height / 2 - 50, '#ef4444', 2) 
        ];

        function drawTable() {
            ctx.fillStyle = '#452c1e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#1e5631';
            ctx.fillRect(15, 15, canvas.width - 30, canvas.height - 30);
            ctx.fillStyle = '#26733f';
            ctx.fillRect(CUSHION_SIZE, CUSHION_SIZE, TABLE_WIDTH, TABLE_HEIGHT);
            ctx.fillStyle = '#d1d5db';
            const drawDiamonds = (x, y) => {
                ctx.beginPath(); ctx.arc(x, y, 3, 0, Math.PI * 2); ctx.fill();
            };
            for (let i = 1; i < 8; i++) {
                let dx = CUSHION_SIZE + i * (TABLE_WIDTH / 8);
                drawDiamonds(dx, CUSHION_SIZE / 2); drawDiamonds(dx, canvas.height - CUSHION_SIZE / 2);
            }
            for (let i = 1; i < 4; i++) {
                let dy = CUSHION_SIZE + i * (TABLE_HEIGHT / 4);
                drawDiamonds(CUSHION_SIZE / 2, dy); drawDiamonds(canvas.width - CUSHION_SIZE / 2, dy);
            }
        }

        function separateOverlappingBalls() {
            for (let i = 0; i < balls.length; i++) {
                for (let j = i + 1; j < balls.length; j++) {
                    let b1 = balls[i]; let b2 = balls[j];
                    let dx = b2.x - b1.x; let dy = b2.y - b1.y;
                    let dist = Math.hypot(dx, dy);

                    if (dist < b1.radius + b2.radius) {
                        let overlap = (b1.radius + b2.radius) - dist + 0.5; 
                        let nx = dist === 0 ? 1 : dx / dist;
                        let ny = dist === 0 ? 0 : dy / dist;
                        b1.x -= nx * overlap / 2; b2.x += nx * overlap / 2;
                        b1.y -= ny * overlap / 2; b2.y += ny * overlap / 2;
                    }
                }
            }
        }

        function getPredictedPath(startBall, testAngle, currentSpinX, maxBounces = 12) {
            let path = [{x: startBall.x, y: startBall.y, isBounce: false}];
            let currentX = startBall.x; let currentY = startBall.y;
            let dirX = Math.cos(testAngle); let dirY = Math.sin(testAngle);
            let radius = startBall.radius;
            let bounces = 0; 
            let hitBallIds = [];
            let targetBalls = balls.filter(b => b.id !== startBall.id);
            let lastHitBall = null; 

            while (bounces < maxBounces) {
                let minT = Infinity; let hitType = null; let hitObj = null;

                if (dirX > 0) {
                    let t = (canvas.width - CUSHION_SIZE - radius - currentX) / dirX;
                    if (t > 0.01 && t < minT) { minT = t; hitType = 'wall_v'; }
                } else if (dirX < 0) {
                    let t = (CUSHION_SIZE + radius - currentX) / dirX;
                    if (t > 0.01 && t < minT) { minT = t; hitType = 'wall_v'; }
                }
                
                if (dirY > 0) {
                    let t = (canvas.height - CUSHION_SIZE - radius - currentY) / dirY;
                    if (t > 0.01 && t < minT) { minT = t; hitType = 'wall_h'; }
                } else if (dirY < 0) {
                    let t = (CUSHION_SIZE + radius - currentY) / dirY;
                    if (t > 0.01 && t < minT) { minT = t; hitType = 'wall_h'; }
                }

                for (let ball of targetBalls) {
                    if (ball === lastHitBall) continue; 
                    let Lx = ball.x - currentX; let Ly = ball.y - currentY;
                    let tca = Lx * dirX + Ly * dirY; 
                    if (tca < 0) continue; 
                    let d2 = (Lx * Lx + Ly * Ly) - tca * tca; 
                    let radiusSum = startBall.radius + ball.radius;
                    if (d2 > radiusSum * radiusSum) continue; 
                    let thc = Math.sqrt(radiusSum * radiusSum - d2); 
                    let t0 = tca - thc; 
                    if (t0 > 0.1 && t0 < minT) { minT = t0; hitType = 'ball'; hitObj = ball; }
                }

                if (minT === Infinity) {
                    path.push({x: currentX + dirX * 1000, y: currentY + dirY * 1000, isBounce: false});
                    break; 
                }

                currentX += dirX * minT; currentY += dirY * minT;
                path.push({x: currentX, y: currentY, hitBall: hitType === 'ball', isBounce: true});

                // TÍNH TOÁN ÉP-PHÊ ĐÃ SỬA LỖI
                if (hitType === 'wall_v') {
                    // Băng ngắn (trái/phải): Dùng dấu '+'
                    let simVx = dirX * -WALL_RESTITUTION;
                    let simVy = dirY + (Math.sign(dirX) * currentSpinX * 2 * Math.abs(simVx));
                    let len = Math.hypot(simVx, simVy);
                    dirX = simVx / len; dirY = simVy / len;
                    bounces++; lastHitBall = null; currentSpinX *= 0.7; 
                } 
                else if (hitType === 'wall_h') {
                    // Băng dài (trên/dưới): Dùng dấu '-'
                    let simVy = dirY * -WALL_RESTITUTION;
                    let simVx = dirX - (Math.sign(dirY) * currentSpinX * 2 * Math.abs(simVy));
                    let len = Math.hypot(simVx, simVy);
                    dirX = simVx / len; dirY = simVy / len;
                    bounces++; lastHitBall = null; currentSpinX *= 0.7; 
                } 
                else if (hitType === 'ball') {
                    if (!hitBallIds.includes(hitObj.id)) { hitBallIds.push(hitObj.id); }
                    if (hitBallIds.length === 2) { break; } 

                    let dx = hitObj.x - currentX; let dy = hitObj.y - currentY;
                    let len = Math.hypot(dx, dy); let nx = dx / len; let ny = dy / len;
                    let dot = dirX * nx + dirY * ny; dirX = dirX - dot * nx; dirY = dirY - dot * ny;
                    let newLen = Math.hypot(dirX, dirY);
                    if (newLen > 0.01) { dirX /= newLen; dirY /= newLen; } else { break; }
                    
                    bounces++; lastHitBall = hitObj; 
                    currentX += dirX * 0.1; currentY += dirY * 0.1; 
                }
            }
            return { points: path, hitBallIds };
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawTable();

            separateOverlappingBalls();

            balls.forEach(b => {
                b.x = Math.max(CUSHION_SIZE + b.radius, Math.min(canvas.width - CUSHION_SIZE - b.radius, b.x));
                b.y = Math.max(CUSHION_SIZE + b.radius, Math.min(canvas.height - CUSHION_SIZE - b.radius, b.y));
            });

            balls.forEach(b => b.draw());

            if (mode === 'AIM' && showCue) {
                let cueBall = balls[cueBallIndex];
                let prediction = getPredictedPath(cueBall, aimAngle, spinX, 10); 
                let pathPts = prediction.points;

                ctx.beginPath(); ctx.moveTo(pathPts[0].x, pathPts[0].y);
                for (let i = 1; i < pathPts.length; i++) { ctx.lineTo(pathPts[i].x, pathPts[i].y); }
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.7)';
                ctx.setLineDash([5, 5]); ctx.lineWidth = 1.5; ctx.stroke(); ctx.setLineDash([]);

                for (let i = 1; i < pathPts.length; i++) {
                    if (pathPts[i].isBounce) {
                        ctx.beginPath(); ctx.arc(pathPts[i].x, pathPts[i].y, BALL_RADIUS, 0, Math.PI * 2);
                        ctx.strokeStyle = pathPts[i].hitBall ? 'rgba(252, 211, 77, 0.8)' : 'rgba(255, 255, 255, 0.4)';
                        ctx.lineWidth = 1; ctx.stroke();
                    }
                }

                let cueDist = BALL_RADIUS + 20;
                let cueStartX = cueBall.x - Math.cos(aimAngle) * cueDist;
                let cueStartY = cueBall.y - Math.sin(aimAngle) * cueDist;
                let cueEndX = cueBall.x - Math.cos(aimAngle) * (cueDist + 150);
                let cueEndY = cueBall.y - Math.sin(aimAngle) * (cueDist + 150);

                ctx.beginPath(); ctx.moveTo(cueStartX, cueStartY); ctx.lineTo(cueEndX, cueEndY);
                ctx.lineWidth = 4;
                let grad = ctx.createLinearGradient(cueStartX, cueStartY, cueEndX, cueEndY);
                grad.addColorStop(0, '#a3e635'); grad.addColorStop(0.05, '#e5e7eb'); 
                grad.addColorStop(0.3, '#fcd34d'); grad.addColorStop(1, '#78350f'); 
                ctx.strokeStyle = grad; ctx.lineCap = 'round'; ctx.stroke(); ctx.lineCap = 'butt';
            }
            requestAnimationFrame(render);
        }

        function getMousePos(evt) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX = evt.clientX; let clientY = evt.clientY;
            if (evt.touches && evt.touches.length > 0) {
                clientX = evt.touches[0].clientX; clientY = evt.touches[0].clientY;
            }
            return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
        }

        canvas.addEventListener('mousedown', handleStart);
        canvas.addEventListener('touchstart', handleStart, {passive: false});
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('touchmove', handleMove, {passive: false});
        window.addEventListener('mouseup', handleEnd);
        window.addEventListener('touchend', handleEnd);

        function handleStart(e) {
            if(e.type === 'touchstart') e.preventDefault();
            const pos = getMousePos(e);

            if (mode === 'PLACE') {
                for (let i = balls.length - 1; i >= 0; i--) {
                    let b = balls[i];
                    if (Math.hypot(pos.x - b.x, pos.y - b.y) <= b.radius * 1.5) {
                        isDragging = true; dragBallIndex = i; break;
                    }
                }
            } else if (mode === 'AIM') {
                let cueBall = balls[cueBallIndex];
                aimAngle = Math.atan2(pos.y - cueBall.y, pos.x - cueBall.x);
                showCue = true;
            }
        }

        function handleMove(e) {
            if(e.type === 'touchmove') e.preventDefault(); 
            if (mode === 'PLACE' && isDragging && dragBallIndex !== -1) {
                const pos = getMousePos(e);
                balls[dragBallIndex].x = pos.x;
                balls[dragBallIndex].y = pos.y;
            } else if (mode === 'AIM' && showCue) {
                const pos = getMousePos(e);
                let cueBall = balls[cueBallIndex];
                aimAngle = Math.atan2(pos.y - cueBall.y, pos.x - cueBall.x);
            }
        }

        function handleEnd(e) {
            if (mode === 'PLACE') { isDragging = false; dragBallIndex = -1; }
        }

        // --- Nút Công Cụ ---
        function saveState() {
            savedBallsState = balls.map(b => ({x: b.x, y: b.y}));
        }

        document.getElementById('btn-undo').addEventListener('click', () => {
            if (savedBallsState.length > 0) {
                balls.forEach((b, i) => { b.x = savedBallsState[i].x; b.y = savedBallsState[i].y; });
                mode = 'PLACE'; document.getElementById('mode-place').click();
                showCue = false;
            }
        });

        document.getElementById('btn-clear-path').addEventListener('click', () => {
            showCue = false;
        });

        const btnPlace = document.getElementById('mode-place');
        const btnAim = document.getElementById('mode-aim');
        const modeHint = document.getElementById('mode-hint');

        btnPlace.addEventListener('click', () => {
            mode = 'PLACE';
            btnPlace.classList.add('active'); btnAim.classList.remove('active');
            modeHint.textContent = "Kéo thả các bi để xếp thế bi mong muốn";
            canvas.style.cursor = 'grab'; showCue = false;
        });

        btnAim.addEventListener('click', () => {
            mode = 'AIM';
            btnAim.classList.add('active'); btnPlace.classList.remove('active');
            modeHint.textContent = "Di chuyển chuột xung quanh bi chủ để xoay ngắm và xem quỹ đạo";
            canvas.style.cursor = 'crosshair';
        });

        document.querySelectorAll('input[name="cueball"]').forEach(radio => {
            radio.addEventListener('change', (e) => { 
                cueBallIndex = parseInt(e.target.value); 
                showCue = false; 
            });
        });

        const spinPad = document.getElementById('spin-pad');
        const spinDot = document.getElementById('spin-dot');
        const valX = document.getElementById('spin-x-val');
        let isSpinDragging = false;

        function updateSpin(e) {
            const rect = spinPad.getBoundingClientRect();
            let clientX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            let clientY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            let x = clientX - rect.left - rect.width / 2;
            let y = clientY - rect.top - rect.height / 2;
            
            const maxR = 50; const dist = Math.hypot(x, y);
            if (dist > maxR) { x = (x / dist) * maxR; y = (y / dist) * maxR; }
            y = 0; 
            
            spinDot.style.left = `${x + rect.width/2}px`;
            spinDot.style.top = `50%`;
            spinX = x / maxR;
            valX.textContent = spinX.toFixed(2);
        }

        spinPad.addEventListener('mousedown', (e) => { isSpinDragging = true; updateSpin(e); });
        spinPad.addEventListener('touchstart', (e) => { isSpinDragging = true; updateSpin(e); e.preventDefault(); });
        window.addEventListener('mousemove', (e) => { if (isSpinDragging) updateSpin(e); });
        window.addEventListener('touchmove', (e) => { if (isSpinDragging) updateSpin(e); });
        window.addEventListener('mouseup', () => { isSpinDragging = false; });
        window.addEventListener('touchend', () => { isSpinDragging = false; });

        document.getElementById('btn-reset-spin').addEventListener('click', () => {
            spinX = 0; spinDot.style.left = '50%'; spinDot.style.top = '50%';
            valX.textContent = '0.00'; 
        });

        saveState();
        requestAnimationFrame(render);
    </script>
</body>
</html>
